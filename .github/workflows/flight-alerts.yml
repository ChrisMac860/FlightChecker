name: Flight Alert Bot

on:
  schedule:
    - cron: "*/15 * * * *"
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      flight_sources:
        description: "Comma-separated sources to run: gmail (Google Flights/Skyscanner email alerts), ryanair, aviasales"
        required: false
        default: "gmail,ryanair,aviasales"

jobs:
  check-gmail-flight-alerts:
    if: ${{ (github.event_name == 'schedule' && github.event.schedule == '*/15 * * * *') || (github.event_name == 'workflow_dispatch' && contains(inputs.flight_sources, 'gmail')) }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      # Shared with the API job so the two never push to docs/deals.json
      # concurrently (which would force a conflicting rebase on a generated file).
      group: flight-alerts-push
      cancel-in-progress: false

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run flight alert checker
        env:
          FLIGHT_SOURCES: gmail
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_LABEL: ${{ vars.GMAIL_LABEL || 'Holidays/Flight alerts' }}
          GMAIL_PROCESSED_LABEL: ${{ vars.GMAIL_PROCESSED_LABEL || 'FlightChecker/Processed' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DEALS_LOG_FILE: docs/deals.json
        run: python main.py

      - name: Publish email deals to the site
        if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/deals.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No new email deals to publish."
            exit 0
          fi
          git commit -m "chore: publish email flight deals [skip ci]"
          for attempt in 1 2 3 4 5; do
            if git push; then echo "Pushed on attempt $attempt"; exit 0; fi
            echo "Push rejected (attempt $attempt); syncing with ${GITHUB_REF_NAME}…"
            git rebase --abort 2>/dev/null || true
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || git rebase --abort 2>/dev/null || true
          done
          echo "Failed to push after retries" >&2
          exit 1

  check-api-fares:
    if: ${{ (github.event_name == 'schedule' && github.event.schedule == '0 7 * * *') || (github.event_name == 'workflow_dispatch' && (contains(inputs.flight_sources, 'ryanair') || contains(inputs.flight_sources, 'aviasales'))) }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: flight-alerts-push
      cancel-in-progress: false

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Ryanair + Aviasales fare checkers
        env:
          FLIGHT_SOURCES: ryanair,aviasales
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RYANAIR_ORIGIN_AIRPORTS: ${{ vars.RYANAIR_ORIGIN_AIRPORTS || 'DUB,BFS' }}
          RYANAIR_DESTINATIONS: ${{ vars.RYANAIR_DESTINATIONS || 'all' }}
          RYANAIR_SCAN_MONTHS: ${{ vars.RYANAIR_SCAN_MONTHS || '6' }}
          RYANAIR_MAX_RETURN_PRICE: ${{ vars.RYANAIR_MAX_RETURN_PRICE || '100' }}
          RYANAIR_DIGEST_LIMIT: ${{ vars.RYANAIR_DIGEST_LIMIT || '12' }}
          RYANAIR_MAX_TRIP_NIGHTS: ${{ vars.RYANAIR_MAX_TRIP_NIGHTS || '3' }}
          AVIASALES_ORIGIN_AIRPORTS: ${{ vars.AVIASALES_ORIGIN_AIRPORTS || 'DUB,BFS' }}
          AVIASALES_SCAN_MONTHS: ${{ vars.AVIASALES_SCAN_MONTHS || '6' }}
          AVIASALES_MAX_RETURN_PRICE: ${{ vars.AVIASALES_MAX_RETURN_PRICE || '100' }}
          TRAVELPAYOUTS_TOKEN: ${{ secrets.TRAVELPAYOUTS_TOKEN }}
          STATE_FILE: state/seen_deals.json
          DEALS_LOG_FILE: docs/deals.json
          PRICE_DROP_EUR: ${{ vars.PRICE_DROP_EUR || '5' }}
        run: python main.py

      - name: Persist deal log + state (dedupe + keepalive)
        if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          mkdir -p state docs
          date -u +"%Y-%m-%dT%H:%M:%SZ" > state/last_run.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state docs/deals.json
          if git diff --cached --quiet; then
            echo "No state changes to commit."
            exit 0
          fi
          git commit -m "chore: update flight deals + state [skip ci]"
          for attempt in 1 2 3 4 5; do
            if git push; then echo "Pushed on attempt $attempt"; exit 0; fi
            echo "Push rejected (attempt $attempt); syncing with ${GITHUB_REF_NAME}…"
            git rebase --abort 2>/dev/null || true
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || git rebase --abort 2>/dev/null || true
          done
          echo "Failed to push after retries" >&2
          exit 1
